<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Rentals</title>
    <link href="/styles/main.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="login_main">
    <header>
      <strong>Movie Rentals</strong>
    </header>
    <div>
      <article>
        <h1 style="text-align: center">Welcome to Movie Rentals!</h1>
        <div style="background-color: lightgrey; width: 40%; margin: auto; padding: 1em">
          <form id="loginForm" onsubmit="submitLogin(event)">
            <label>Email:</label><br />
            <input type="text" id="email" name="email" placeholder="Email" style="width: 100%" />
            <br />
            <br />
            <label>Password:</label><br />
            <input type="password" id="password" name="password" placeholder="Password" style="width: 100%" />
            <br />
            <br />
            <div id="err_msg" style="color: red; font-weight: bold;"></div>
            <div style="width: 100%; text-align: center">
              <button type="submit" style="width: 45%">Log In</button>
              <button type="button" onclick="window.location.href='/register.html'" style="width: 45%">Register</button>
            </div>
          </form>
        </div>
      </article>
    </div>
  </body>

  <script>
    function submitLogin(event) {
      event.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const users = JSON.parse(localStorage.getItem("users")) || [];
      
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        sessionStorage.setItem("email", email);
        sessionStorage.setItem("password", password);
        window.location.href = "/shop.html";
      } else {
        document.getElementById("err_msg").textContent = "Incorrect username or password.";
      }
    }

    // clear error message when user starts typing
    document.getElementById("email").addEventListener("input", function() {
      document.getElementById("err_msg").textContent = "";
    });

    document.getElementById("password").addEventListener("input", function() {
      document.getElementById("err_msg").textContent = "";
    });
  </script>
</html>
